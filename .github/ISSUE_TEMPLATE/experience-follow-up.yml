name: Experience Follow-up
description: 用于把经验条目回灌成可执行后续任务。
title: "docs: "
labels:
  - experience
body:
  - type: textarea
    id: source
    attributes:
      label: 来源经验
      description: 关联 docs/experience/ 下的条目。
      placeholder: docs/experience/.../2026-03-29-xxx.md
    validations:
      required: true
  - type: textarea
    id: conclusion
    attributes:
      label: 可复用结论
      description: 从经验条目里提炼的稳定结论。
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: 需要回灌到哪里
      description: 文档、测试、hooks、CI、AGENTS 或 backlog。
      placeholder: |
        - 文档：
        - 测试：
        - hooks / CI：
        - AGENTS：
        - backlog：
    validations:
      required: true
  - type: textarea
    id: done_when
    attributes:
      label: 完成标准
      description: 什么情况下可以认为这条经验已经完成回灌。
    validations:
      required: true
